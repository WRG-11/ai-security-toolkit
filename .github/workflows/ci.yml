name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # Test runtime stays stdlib-only; coverage is a CI measurement tool
      # (same posture as the ruff lint job below).
      - name: Test + coverage
        run: |
          pip install coverage
          coverage run -m unittest discover -s tests/ -p "test_*.py"
          coverage report

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check tools/ tests/

  # self-scan: re-add when devguard-scan ships a --show-findings flag so
  # findings from intentional vulnerable lab code can be allowlisted separately.
